<!DOCTYPE html>
<html>
<head>
  <title>NetSuite AI Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    body.light {
      background: #f5f5f5;
      color: black;
    }

    body.dark {
      background: #121212;
      color: white;
    }

    h2 {
      text-align: center;
      padding: 10px;
      margin: 0;
      background: #111;
      color: white;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .bubble {
      max-width: 70%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      white-space: pre-wrap;
    }

    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
    }

    .bot {
      background: #e0e0e0;
      color: black;
      align-self: flex-start;
    }

    body.dark .bot {
      background: #333;
      color: white;
    }

    #input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ccc;
    }

    textarea {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      margin-left: 10px;
      cursor: pointer;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      padding: 5px 10px;
      background: #222;
      color: white;
    }
  </style>
</head>

<body class="light">

<div id="top-bar">
  <span>NetSuite AI Assistant</span>
  <button onclick="toggleTheme()">🌙 Toggle</button>
</div>

<div id="chat"></div>

<div id="input-area">
  <textarea id="input" placeholder="Ask something..."></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

// =========================
// LOAD CHAT HISTORY
// =========================
function loadHistory() {
  const history = JSON.parse(localStorage.getItem("chat_history") || "[]");
  history.forEach(msg => addBubble(msg.text, msg.type));
}

// =========================
// SAVE CHAT HISTORY
// =========================
function saveMessage(text, type) {
  const history = JSON.parse(localStorage.getItem("chat_history") || "[]");
  history.push({ text, type });
  localStorage.setItem("chat_history", JSON.stringify(history));
}

// =========================
// ADD MESSAGE BUBBLE
// =========================
function addBubble(text, type) {
  const bubble = document.createElement("div");
  bubble.className = "bubble " + type;
  bubble.innerText = text;
  chat.appendChild(bubble);
  chat.scrollTop = chat.scrollHeight;
}

// =========================
// TYPING EFFECT
// =========================
function typeText(element, text, speed = 15) {
  let i = 0;
  element.innerText = "";

  function typing() {
    if (i < text.length) {
      element.innerText += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }

  typing();
}

// =========================
// SEND MESSAGE
// =========================
async function sendMessage() {
  const inputBox = document.getElementById("input");
  const message = inputBox.value.trim();
  if (!message) return;

  addBubble(message, "user");
  saveMessage(message, "user");

  inputBox.value = "";

  const botBubble = document.createElement("div");
  botBubble.className = "bubble bot";
  botBubble.innerText = "Thinking...";
  chat.appendChild(botBubble);

  try {
    const res = await fetch("https://netsuite-ai-production.up.railway.app/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    typeText(botBubble, data.response);
    saveMessage(data.response, "bot");

  } catch (error) {
    botBubble.innerText = "Error connecting to server";
  }

  chat.scrollTop = chat.scrollHeight;
}

// =========================
// DARK MODE
// =========================
function toggleTheme() {
  const body = document.body;
  body.classList.toggle("dark");
  body.classList.toggle("light");

  localStorage.setItem("theme", body.classList.contains("dark") ? "dark" : "light");
}

// =========================
// LOAD THEME
// =========================
function loadTheme() {
  const theme = localStorage.getItem("theme") || "light";
  document.body.className = theme;
}

// INIT
loadTheme();
loadHistory();
</script>

</body>
</html>
