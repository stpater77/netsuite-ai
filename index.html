<!DOCTYPE html>
<html>
<head>
  <title>NetSuite AI Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
    }

    h2 {
      text-align: center;
      padding: 10px;
      background: #111;
      color: white;
      margin: 0;
    }

    #chat {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .bubble {
      max-width: 70%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      white-space: pre-wrap;
    }

    .user {
      background: #007bff;
      color: white;
      align-self: flex-end;
      margin-left: auto;
    }

    .bot {
      background: #e0e0e0;
      color: black;
      align-self: flex-start;
      margin-right: auto;
    }

    #input-area {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #ccc;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 10px;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<h2>NetSuite AI Assistant</h2>

<div id="chat"></div>

<div id="input-area">
  <textarea id="input" placeholder="Ask something..."></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  const inputBox = document.getElementById("input");
  const message = inputBox.value.trim();
  if (!message) return;

  const chat = document.getElementById("chat");

  // Add user bubble
  const userBubble = document.createElement("div");
  userBubble.className = "bubble user";
  userBubble.innerText = message;
  chat.appendChild(userBubble);

  inputBox.value = "";

  // Add loading bubble
  const loadingBubble = document.createElement("div");
  loadingBubble.className = "bubble bot";
  loadingBubble.innerText = "Thinking...";
  chat.appendChild(loadingBubble);

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("https://netsuite-ai-production.up.railway.app/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: message })
    });

    const data = await res.json();

    loadingBubble.innerText = data.response;

  } catch (error) {
    loadingBubble.innerText = "Error connecting to server";
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
