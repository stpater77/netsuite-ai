<!DOCTYPE html>
<html>
<head>
  <title>NetSuite AI</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #343541;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 800px;
      margin: auto;
      width: 100%;
    }

    .message {
      display: flex;
      padding: 15px;
    }

    .user {
      justify-content: flex-end;
    }

    .bot {
      justify-content: flex-start;
      background: #444654;
      border-radius: 8px;
    }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 8px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .user .bubble {
      background: #19c37d;
      color: black;
    }

    .bot .bubble {
      background: #444654;
    }

    #input-area {
      display: flex;
      padding: 15px;
      background: #40414f;
      border-top: 1px solid #555;
      max-width: 800px;
      margin: auto;
      width: 100%;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 12px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #19c37d;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }

    button:hover {
      background: #13a96b;
    }

    #mic {
      background: #ff4d4d;
      color: white;
    }

    #mic:hover {
      background: #cc0000;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="input-area">
  <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
  <button onclick="sendMessage()">Send</button>
  <button id="mic" onclick="startVoice()">🎙️</button>
</div>

<script>
const chat = document.getElementById("chat");

// =========================
// ADD MESSAGE
// =========================
function addMessage(text, type) {
  const wrapper = document.createElement("div");
  wrapper.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  wrapper.appendChild(bubble);
  chat.appendChild(wrapper);

  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

// =========================
// TYPING EFFECT
// =========================
function typeText(el, text) {
  let i = 0;
  el.innerText = "";

  function type() {
    if (i < text.length) {
      el.innerText += text[i];
      i++;
      setTimeout(type, 10);
    }
  }

  type();
}

// =========================
// SEND MESSAGE
// =========================
async function sendMessage() {
  const input = document.getElementById("input");
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const botBubble = addMessage("Thinking...", "bot");

  try {
    const res = await fetch("https://netsuite-ai-production.up.railway.app/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    typeText(botBubble, data.response);

  } catch (e) {
    botBubble.innerText = "Error connecting to server";
  }
}

// =========================
// ENTER TO SEND
// =========================
document.getElementById("input").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// =========================
// VOICE INPUT
// =========================
function startVoice() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onstart = () => {
    console.log("Listening...");
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    document.getElementById("input").value = transcript;
  };

  recognition.onerror = (event) => {
    console.error("Voice error:", event.error);
  };

  recognition.start();
}
</script>

</body>
</html>
