<!DOCTYPE html>
<html>
<head>
  <title>NetSuite AI Assistant</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 50px auto;
    }
    textarea {
      width: 100%;
      height: 100px;
    }
    button {
      margin-top: 10px;
      padding: 10px;
    }
    #response {
      margin-top: 20px;
      white-space: pre-wrap;
      border: 1px solid #ccc;
      padding: 10px;
    }
  </style>
</head>
<body>

<h2>NetSuite AI Assistant</h2>

<textarea id="input" placeholder="Ask something..."></textarea>
<br>
<button onclick="sendMessage()">Submit</button>

<div id="response"></div>

<script>
async function sendMessage() {
  const input = document.getElementById("input").value;

  const responseBox = document.getElementById("response");
  responseBox.innerText = "Thinking...";

  try {
    const res = await fetch("https://netsuite-ai-production.up.railway.app/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: input })
    });

    const data = await res.json();

    responseBox.innerText = data.response;
  } catch (error) {
    responseBox.innerText = "Error connecting to server";
  }
}
</script>

</body>
</html>
